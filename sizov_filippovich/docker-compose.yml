services:
  app:
    build: ./app          # собираем образ из папки app/
    ports:
      - "5000:5000"       # пробрасываем порт на хост
    volumes:
      - db_data:/data     # папка для хранения базы данных

volumes:
  db_data:               # именованный том — данные не пропадут при перезапуске
