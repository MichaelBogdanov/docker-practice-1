services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: board
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
 
  app:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: board
      DB_USER: user
      DB_PASSWORD: password
    depends_on:
      - db
 
volumes:
  pgdata:
 